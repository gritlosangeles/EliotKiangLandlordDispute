<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Landlord</title>
  <meta name="description" content="Landlord.">
  <style>
    :root {
      --paper: #ffffff;
      --ink: #171717;
      --max: 760px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.65;
    }

    main {
      width: min(100% - 40px, var(--max));
      margin: 0 auto;
      padding: 72px 0;
    }

    .timeline {
      padding-top: 32px;
    }

    @media (max-width: 700px) {
      main {
        width: min(100% - 28px, var(--max));
        padding-top: 44px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="timeline" aria-label="Timeline of events"></section>
  </main>
</body>
</html>
