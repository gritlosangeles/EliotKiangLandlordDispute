<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eliot Kiang Landlord Dispute</title>
  <meta name="description" content="Eliot Kiang Landlord Dispute. 530 South Hewitt Street, Unit 129, Los Angeles, CA 90013.">
  <style>
    :root {
      --paper: #fbfaf7;
      --ink: #171717;
      --muted: #666666;
      --line: #d9d6cf;
      --max: 760px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.65;
    }

    main {
      width: min(100% - 40px, var(--max));
      margin: 0 auto;
      padding: 72px 0;
    }

    header {
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    .label {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(24px, 4.5vw, 38px);
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .address {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 700px) {
      main {
        width: min(100% - 28px, var(--max));
        padding-top: 44px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="label">Timeline of Events</p>
      <h1>Eliot Kiang Landlord Dispute</h1>
      <p class="address">530 South Hewitt Street, Unit 129, Los Angeles, CA 90013</p>
    </header>
  </main>
</body>
</html>
