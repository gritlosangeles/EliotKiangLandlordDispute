<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eliot Kiang Landlord Dispute</title>
  <meta name="description" content="Eliot Kiang Landlord Dispute. 530 South Hewitt Street, Unit 129, Los Angeles, CA 90013.">
  <style>
    :root {
      --paper: #ffffff;
      --ink: #171717;
      --muted: #666666;
      --line: #d9d6cf;
      --max: 760px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 14px;
      line-height: 1.65;
    }

    main {
      width: min(100% - 40px, var(--max));
      margin: 0 auto;
      padding: 72px 0;
    }

    header {
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    h1,
    p,
    .date,
    .event {
      margin: 0;
      font-size: 14px;
      line-height: 1.65;
      font-weight: 400;
      letter-spacing: 0;
    }

    .address,
    .date {
      color: var(--muted);
    }

    .timeline {
      padding-top: 32px;
    }

    .entry {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 24px;
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }

    .entry:first-of-type {
      border-top: 0;
    }

    @media (max-width: 700px) {
      main {
        width: min(100% - 28px, var(--max));
        padding-top: 44px;
      }

      .entry {
        grid-template-columns: 1fr;
        gap: 2px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Eliot Kiang Landlord Dispute</h1>
      <p class="address">530 South Hewitt Street, Unit 129, Los Angeles, CA 90013</p>
    </header>

    <section class="timeline" aria-label="Timeline of events">
      <article class="entry">
        <p class="date">Date</p>
        <p class="event">Event details to be added.</p>
      </article>

      <article class="entry">
        <p class="date">Date</p>
        <p class="event">Event details to be added.</p>
      </article>

      <article class="entry">
        <p class="date">Date</p>
        <p class="event">Event details to be added.</p>
      </article>
    </section>
  </main>
</body>
</html>
